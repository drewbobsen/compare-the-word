# docker-compose.override.yml
# Auto-merged by `docker compose up` — local dev only, direct ports, hot reload.
services:
  db:
    ports:
      - "5432:5432"

  api:
    build:
      target: builder
    ports:
      - "8080:8080"
    volumes:
      - ./api:/app
    command: cargo watch -x run

  frontend:
    build:
      target: base
    environment:
      - INTERNAL_API_URL=http://api:8080
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
