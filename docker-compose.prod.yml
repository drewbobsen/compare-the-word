# docker-compose.prod.yml
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  db:
    restart: always

  api:
    image: ghcr.io/drewbobsen/compare-the-word-api:latest
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
    expose:
      - "8080"

  frontend:
    image: ghcr.io/drewbobsen/compare-the-word-frontend:latest
    restart: always
    environment:
      - NODE_ENV=production
      - VIRTUAL_HOST=comparetheword.app,www.comparetheword.app
      - LETSENCRYPT_HOST=comparetheword.app,www.comparetheword.app
      - VIRTUAL_PORT=3000
      - INTERNAL_API_URL=http://api:8080
    expose:
      - "3000"

  proxy:
    image: nginxproxy/nginx-proxy:latest
    container_name: bible_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs
      - ./vhost:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    depends_on:
      - frontend
      - api

  acme-companion:
    image: nginxproxy/acme-companion:latest
    container_name: acme-companion
    restart: always
    environment:
      - DEFAULT_EMAIL=andrew@erhardt.cloud
      - NGINX_PROXY_CONTAINER=bible_nginx
    volumes:
      - ./certs:/etc/nginx/certs
      - ./vhost:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - proxy

volumes:
  certs:
  vhost:
  html:
