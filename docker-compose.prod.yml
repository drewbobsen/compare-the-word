# docker-compose.prod.yml
services:
  db:
    restart: always
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data # Ensure data persists!

  api:
    restart: always

  frontend:
    restart: always
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    environment:
      - NODE_ENV=production
      - VIRTUAL_HOST=comparetheword.app,www.comparetheword.app
      - LETSENCRYPT_HOST=comparetheword.app,www.comparetheword.app
      - VIRTUAL_PORT=3000

  proxy:
    image: nginxproxy/nginx-proxy:latest
    restart: always
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
  acme-companion:
    image: nginxproxy/acme-companion:latest
    container_name: acme-companion
    environment:
      - DEFAULT_EMAIL=andrew@erhardt.cloud
      - NGINX_PROXY_CONTAINER=bible_nginx
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - proxy

volumes:
  postgres_prod_data:
  certs:
  vhost:
  html:
  acme: # Hide it from standard startup commands