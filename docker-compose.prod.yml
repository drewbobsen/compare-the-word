services:
  db:
    restart: always
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data 
  frontend:
    image: ghcr.io/drewbobsen/compare-the-word-frontend:latest
    restart: always
    environment:
      - NODE_ENV=production
      - VIRTUAL_HOST=comparetheword.app,www.comparetheword.app
      - LETSENCRYPT_HOST=comparetheword.app,www.comparetheword.app
      - VIRTUAL_PORT=3000
      - INTERNAL_API_URL=http://api:8080 
    expose:
      - "3000"

  api:
    image: ghcr.io/drewbobsen/compare-the-word-api:latest
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

  proxy:
    image: nginxproxy/nginx-proxy:latest
    restart: always
    volumes:
      - ./certs:/etc/nginx/certs
      - ./vhost:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
  acme-companion:
    image: nginxproxy/acme-companion:latest
    container_name: acme-companion
    environment:
      - DEFAULT_EMAIL=andrew@erhardt.cloud
      - NGINX_PROXY_CONTAINER=bible_nginx
    volumes:
      - ./certs:/etc/nginx/certs
      - ./vhost:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - proxy

volumes:
  postgres_prod_data:
  certs:
  vhost:
  html:
  acme: 